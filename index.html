<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在加载内容...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            overflow: hidden; /* 防止内嵌入页面后出现双滚动条 */
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 212, 255, 0.3);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .text {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }
        
        .error {
            color: #ff6b6b;
            text-align: center;
            padding: 20px;
        }
        
        .error button {
            margin-top: 15px;
            padding: 10px 30px;
            background: rgba(255,100,100,0.1);
            border: 1px solid rgba(255,100,100,0.3);
            color: #ff6b6b;
            border-radius: 8px;
            cursor: pointer;
        }

        /* 新增：设置 iframe 满屏撑满 */
        #content-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none; /* 初始隐藏，加载成功后再显示 */
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div class="text">正在获取最新地址...</div>
    </div>

    <div id="error" class="error" style="display:none;">
        <div id="errorMsg"></div>
        <button onclick="location.reload()">重试</button>
    </div>

    <iframe id="content-frame"></iframe>

    <script>
        const DATA_URL = 'url.json';
        
        function getParam(name) {
            const url = new URL(window.location.href);
            return url.searchParams.get(name);
        }
        
        async function init() {
            try {
                const res = await fetch(DATA_URL + '?t=' + Date.now());
                if (!res.ok) throw new Error('HTTP ' + res.status);
                
                const data = await res.json();
                if (!data.mid) throw new Error('缺少 mid 字段');
                
                const mid = data.mid;
                let baseUrl;
                
                if (mid.startsWith('--') && mid.endsWith('++')) {
                    baseUrl = mid.replace('--', 'https://').replace('++', '.trycloudflare.com');
                } else {
                    baseUrl = 'https://' + mid + '.trycloudflare.com';
                }
                
                // 获取路径参数，默认根目录
                const path = getParam('path') || '';
                const targetUrl = baseUrl + '/' + path;
                
                // --- 修改部分开始 ---
                // 1. 隐藏加载提示
                document.getElementById('loading').style.display = 'none';
                
                // 2. 将 targetUrl 赋值给 iframe 并展示
                const frame = document.getElementById('content-frame');
                frame.src = targetUrl;
                frame.style.display = 'block';
                // --- 修改部分结束 ---
                
            } catch (e) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('errorMsg').textContent = '获取失败: ' + e.message;
                document.getElementById('error').style.display = 'block';
            }
        }
        
        init();
    </script>
</body>
</html>
