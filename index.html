<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在跳转...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 212, 255, 0.3);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .text {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }
        
        .error {
            color: #ff6b6b;
            text-align: center;
            padding: 20px;
        }
        
        .error button {
            margin-top: 15px;
            padding: 10px 30px;
            background: rgba(255,100,100,0.1);
            border: 1px solid rgba(255,100,100,0.3);
            color: #ff6b6b;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div class="text">正在获取最新地址...</div>
    </div>

    <script>
        const DATA_URL = 'url.json';
        
        async function init() {
            try {
                const res = await fetch(DATA_URL + '?t=' + Date.now());
                if (!res.ok) throw new Error('HTTP ' + res.status);
                
                const data = await res.json();
                if (!data.mid) throw new Error('缺少 mid 字段');
                
                const mid = data.mid;
                let targetUrl;
                
                if (mid.startsWith('--') && mid.endsWith('++')) {
                    targetUrl = mid.replace('--', 'https://').replace('++', '.trycloudflare.com');
                } else {
                    targetUrl = 'https://' + mid + '.trycloudflare.com';
                }
                
                // 默认跳转到 /changyi/，你可以改成其他路径
                window.location.replace(targetUrl + '/changyi/');
                
            } catch (e) {
                document.body.innerHTML = `
                    <div class="error">
                        <div>获取失败: ${e.message}</div>
                        <button onclick="location.reload()">重试</button>
                    </div>
                `;
            }
        }
        
        init();
    </script>
</body>
</html>
