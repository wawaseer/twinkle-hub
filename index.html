<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Project Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
        }
        
        #loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            z-index: 100;
            transition: opacity 0.5s;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 212, 255, 0.3);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .text {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }
        
        .error {
            color: #ff6b6b;
            text-align: center;
            padding: 20px;
        }
        
        .error button {
            margin-top: 15px;
            padding: 10px 30px;
            background: rgba(255,100,100,0.1);
            border: 1px solid rgba(255,100,100,0.3);
            color: #ff6b6b;
            border-radius: 8px;
            cursor: pointer;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
        
        iframe.show {
            display: block;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div class="text">正在获取最新地址...</div>
    </div>

    <div id="error" class="error" style="display:none;">
        <div id="errorMsg"></div>
        <button onclick="location.reload()">重试</button>
    </div>

    <iframe id="frame"></iframe>

    <script>
        const DATA_URL = 'url.json';
        
        async function init() {
            try {
                const res = await fetch(DATA_URL + '?t=' + Date.now());
                if (!res.ok) throw new Error('HTTP ' + res.status);
                
                const data = await res.json();
                if (!data.mid) throw new Error('缺少 mid 字段');
                
                const mid = data.mid;
                let targetUrl;
                
                if (mid.startsWith('--') && mid.endsWith('++')) {
                    targetUrl = mid.replace('--', 'https://').replace('++', '.trycloudflare.com');
                } else {
                    targetUrl = 'https://' + mid + '.trycloudflare.com';
                }
                
                // 加载 iframe
                const frame = document.getElementById('frame');
                frame.src = targetUrl + '/';
                frame.classList.add('show');
                
                // 隐藏 loading
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading').style.display = 'none';
                }, 500);
                
            } catch (e) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('errorMsg').textContent = '获取失败: ' + e.message;
                document.getElementById('error').style.display = 'block';
            }
        }
        
        init();
    </script>
</body>
</html>
